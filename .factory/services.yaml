commands:
  install: if [ -f package.json ]; then npm install; fi && if [ -f Cargo.toml ]; then cargo fetch; fi
  typecheck: npm run typecheck --if-present && if [ -f Cargo.toml ]; then cargo check --workspace --all-targets; fi
  lint: npm run lint --if-present && if [ -f Cargo.toml ]; then cargo fmt --all -- --check && cargo clippy --workspace --all-targets -- -D warnings; fi
  test: CI=1 npm run test --if-present && if [ -f Cargo.toml ]; then cargo test --workspace -- --test-threads=4; fi
  build: npm run build --if-present && if [ -f Cargo.toml ]; then cargo build --workspace; fi

services:
  lightwalletd-tunnel:
    start: ssh -f -N -L 3184:127.0.0.1:9067 bettervps
    stop: p=$(lsof -ti tcp:3184); if [ -n "$p" ]; then kill $p; fi
    healthcheck: lsof -iTCP:3184 -sTCP:LISTEN >/dev/null
    port: 3184
    depends_on: []

  backend:
    start: PORT=3181 cargo run --bin zimppy-backend
    stop: p=$(lsof -ti tcp:3181); if [ -n "$p" ]; then kill $p; fi
    healthcheck: curl -sf http://127.0.0.1:3181/health
    port: 3181
    depends_on: [lightwalletd-tunnel]

  api:
    start: PORT=3180 npm run dev:api
    stop: p=$(lsof -ti tcp:3180); if [ -n "$p" ]; then kill $p; fi
    healthcheck: curl -sf http://127.0.0.1:3180/health
    port: 3180
    depends_on: [backend]
